<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
    <title>Alice Live · MP4 / WebP</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="shared.css?v=8" />
    <link rel="stylesheet" href="styles.css?v=8" />
  </head>
  <body>
    <a class="skipLink" href="#mainContent">К сравнению</a>

    <header class="siteHeader">
      <div class="siteHeaderInner">
        <a class="wordmark" href="index.html?v=8" aria-label="Alice Live Media Lab">
          <span class="wordmarkDot" aria-hidden="true"></span>
          <span>
            <strong>Alice Live</strong>
            <small>Media Lab</small>
          </span>
        </a>

        <nav class="viewSwitch" aria-label="Разделы демо">
          <a href="generated-gallery.html?v=8">Библиотека</a>
          <a aria-current="page" href="index.html?v=8">Форматы</a>
          <a href="model-comparison-5s/?v=8">Модели</a>
        </nav>
      </div>
    </header>

    <main class="appShell" id="mainContent">
      <header class="pageHeader">
        <div class="titleBlock">
          <p class="eyebrow">Сравнение форматов · 7 пар</p>
          <h1>Один кадр.<br />Два контейнера.</h1>
          <p class="intro">
            MP4 и анимированный WebP с одинаковыми разрешением, длительностью и частотой
            кадров.
          </p>
        </div>
      </header>

      <dl class="summaryGrid" id="summary" aria-label="Сводка конвертации"></dl>

      <section class="playbackBar" aria-label="Управление воспроизведением">
        <p class="playbackCopy" id="playbackStatus" aria-live="polite">
          Перезапуск возвращает MP4 и показанные WebP к первому кадру и запускает MP4.
        </p>
        <button
          class="controlButton strong"
          type="button"
          data-action="restart-all"
          aria-describedby="playbackStatus"
        >
          Перезапустить все пары
        </button>
      </section>

      <section class="comparisonList" id="comparisonList" aria-label="Сравнения медиа"></section>
    </main>

    <script src="app.js?v=8"></script>
  </body>
</html>
